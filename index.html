<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plodavaya</title>
    <link rel="stylesheet" href="./styles/main.css">
  </head>
  <body>
    <header class="container2">
      <div class="background">
        <img class="back-up" src="./assets/header/back-up.svg">
        <img class="back-down" src="./assets/header/back-down.svg">
      </div>
      <img src="./assets/header/logo.svg" alt="Плодовая" class="logo">
      <p>уже забронировали столик?</p>
      <div class="chairs">
        <div class="chair-1 chair">
          <img class="chair-1-norm chair-norm" src="./assets/header/chair.svg" alt="Бронь столика">
          <img class="chair-1-hover chair-hover" src="./assets/header/chair_hover.svg" alt="Бронь столика">
          <img class="chair-1-done chair-done" src="./assets/header/chair_done.svg" alt="Бронь столика">
        </div>
        <div class="chair-2 chair">
          <img class="chair-2-norm chair-norm" src="./assets/header/chair.svg" alt="Бронь столика">
          <img class="chair-2-hover chair-hover" src="./assets/header/chair_hover.svg" alt="Бронь столика">
          <img class="chair-2-done chair-done" src="./assets/header/chair_done.svg" alt="Бронь столика">
        </div>
        <div class="chair-3 chair">
          <img class="chair-3-norm chair-norm" src="./assets/header/chair.svg" alt="Бронь столика">
          <img class="chair-3-hover chair-hover" src="./assets/header/chair_hover.svg" alt="Бронь столика">
          <img class="chair-3-done chair-done" src="./assets/header/chair_done.svg" alt="Бронь столика">
        </div>
        <div class="chair-4 chair">
          <img class="chair-4-norm chair-norm" src="./assets/header/chair.svg" alt="Бронь столика">
          <img class="chair-4-hover chair-hover" src="./assets/header/chair_hover.svg" alt="Бронь столика">
          <img class="chair-4-done chair-done" src="./assets/header/chair_done.svg" alt="Бронь столика">
        </div>
        <div class="chair-5 chair">
          <img class="chair-5-norm chair-norm" src="./assets/header/chair.svg" alt="Бронь столика">
          <img class="chair-5-hover chair-hover" src="./assets/header/chair_hover.svg" alt="Бронь столика">
          <img class="chair-5-done chair-done" src="./assets/header/chair_done.svg" alt="Бронь столика">
        </div>
      </div>
    </header>

    <main class="container">
      <div class="menu">
        <div class="menu-1">
          <div class="menu_title">
            <h1>меню</h1>
            <p>соберите свой заказ</p>
          </div>
          <div class="menu-catalog" id="menuCatalog">
            <div class="menu-catalog-card" data-card="1" role="button" tabindex="0" aria-label="Карта 1">
              <div class="menu-card-inner">
                <div class="menu-card-face menu-card-face--shirt">
                  <img src="./assets/second-section/card-back.svg" alt="">
                </div>
                <div class="menu-card-face menu-card-face--fruit">
                  <img src="./assets/second-section/apple.svg" alt="Яблоко">
                </div>
              </div>
            </div>
            <div class="menu-catalog-card" data-card="2" role="button" tabindex="0" aria-label="Карта 2">
              <div class="menu-card-inner">
                <div class="menu-card-face menu-card-face--shirt">
                  <img src="./assets/second-section/card-back.svg" alt="">
                </div>
                <div class="menu-card-face menu-card-face--fruit">
                  <img src="./assets/second-section/pear.svg" alt="Груша">
                </div>
              </div>
            </div>
            <div class="menu-catalog-card" data-card="3" role="button" tabindex="0" aria-label="Карта 3">
              <div class="menu-card-inner">
                <div class="menu-card-face menu-card-face--shirt">
                  <img src="./assets/second-section/card-back.svg" alt="">
                </div>
                <div class="menu-card-face menu-card-face--fruit">
                  <img src="./assets/second-section/pomegranate.svg" alt="Гранат">
                </div>
              </div>
            </div>
            <div class="menu-catalog-card" data-card="4" role="button" tabindex="0" aria-label="Карта 4">
              <div class="menu-card-inner">
                <div class="menu-card-face menu-card-face--shirt">
                  <img src="./assets/second-section/card-back.svg" alt="">
                </div>
                <div class="menu-card-face menu-card-face--fruit">
                  <img src="./assets/second-section/cucumber.svg" alt="Огурец">
                </div>
              </div>
            </div>
            <div class="menu-catalog-card" data-card="5" role="button" tabindex="0" aria-label="Карта 5">
              <div class="menu-card-inner">
                <div class="menu-card-face menu-card-face--shirt">
                  <img src="./assets/second-section/card-back.svg" alt="">
                </div>
                <div class="menu-card-face menu-card-face--fruit">
                  <img src="./assets/second-section/banana.svg" alt="Банан">
                </div>
              </div>
            </div>
            <div class="menu-catalog-card" data-card="6" role="button" tabindex="0" aria-label="Карта 6">
              <div class="menu-card-inner">
                <div class="menu-card-face menu-card-face--shirt">
                  <img src="./assets/second-section/card-back.svg" alt="">
                </div>
                <div class="menu-card-face menu-card-face--fruit">
                  <img src="./assets/second-section/strawberry.svg" alt="Клубника">
                </div>
              </div>
            </div>
            <div class="menu-catalog-card" data-card="7" role="button" tabindex="0" aria-label="Карта 7">
              <div class="menu-card-inner">
                <div class="menu-card-face menu-card-face--shirt">
                  <img src="./assets/second-section/card-back.svg" alt="">
                </div>
                <div class="menu-card-face menu-card-face--fruit">
                  <img src="./assets/second-section/melon.svg" alt="Дыня">
                </div>
              </div>
            </div>
            <div class="menu-catalog-card" data-card="8" role="button" tabindex="0" aria-label="Карта 8">
              <div class="menu-card-inner">
                <div class="menu-card-face menu-card-face--shirt">
                  <img src="./assets/second-section/card-back.svg" alt="">
                </div>
                <div class="menu-card-face menu-card-face--fruit">
                  <img src="./assets/second-section/grape.svg" alt="Виноград">
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="menu-2">
          <img src="./assets/second-section/menu-list.svg" alt="menu-list">
          <h3 class="productName">…</h3>
        </div>
      </div>
    </main>

    <div class="container">
      <div class="transition">
        <img class="transition-background" src="./assets/transition/transition.svg">
        <img class="transition-title" src="./assets/transition/logo.svg">
      </div>
    </div>
    
    <div class="container">
      <div class="eyes">
        <img src="./assets/eyes/eyes-mask.svg" alt="Маска" class="eyes-mask">
        <div class="eyes-section">
          <img src="./assets/eyes/eye.svg" alt="Глаз" class="eye1">
          <img src="./assets/eyes/eye.svg" alt="Глаз" class="eye2">
        </div>
      </div>
    </div>

    <div class="container">
      <div class="blender-wrapper">
        <div class="blender">
          <img class="blender-background" src="./assets/blender/blender-background.svg">
          <div class="blender_desc">
            <h3></h3>
            <p></p>
          </div>
          <img class="blender-img blender-drop-target" src="./assets/blender/mixer.svg" alt="Блендер">
          <div class="plate-container">
            <img src="./assets/blender/plate.svg" alt="Тарелка" class="plate">
            <div class="plate-fruits plate-fruits--empty" aria-hidden="true">
              <img class="plate-fruit" data-slot="0" alt="" decoding="async">
              <img class="plate-fruit" data-slot="1" alt="" decoding="async">
            </div>
          </div>


          <img src="./assets/blender/flower.svg" class="flower-1">
          <!-- <img src="./assets/blender/flower.svg" class="flower-2"> -->
        </div>

        <div class="blender-stars">
          <p class="thanks-message" id="thanksMsg">Спасибо за оценку!</p>
          <div class="star">
            <img class="star-grey" src="./assets/footer/star-grey.svg" alt="Звезда">
            <img class="star-red" src="./assets/footer/star-red.svg" alt="Звезда">
          </div>
          <div class="star">
            <img class="star-grey" src="./assets/footer/star-grey.svg" alt="Звезда">
            <img class="star-red" src="./assets/footer/star-red.svg" alt="Звезда">
          </div>
          <div class="star">
            <img class="star-grey" src="./assets/footer/star-grey.svg" alt="Звезда">
            <img class="star-red" src="./assets/footer/star-red.svg" alt="Звезда">
          </div>
          <div class="star">
            <img class="star-grey" src="./assets/footer/star-grey.svg" alt="Звезда">
            <img class="star-red" src="./assets/footer/star-red.svg" alt="Звезда">
          </div>
          <div class="star">
            <img class="star-grey" src="./assets/footer/star-grey.svg" alt="Звезда">
            <img class="star-red" src="./assets/footer/star-red.svg" alt="Звезда">
          </div>
        </div>

        <img src="./assets/blender/flower.svg" class="flower-2">
      </div>
    </div>

    <div class="container">
      <footer>
        <img class="footer-grass" src="./assets/footer/grass.svg">
        <div class="footer-desc">
          <p class="footer-desc-1">студент <br>Кирсанова Е. Д.</p>
          <img class="footer-logo" src="./assets/footer/logo.svg" alt="Логотип">
          <p class="footer-desc-2">куратор <br>Умнова Е. А.</p>
        </div>
      </footer>
    </div>

    <script src="./js/main.js" type="module"></script>
  </body>
</html>
